# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Rule-based multi-signal ranker with explicit reasoning capture. Five scoring
  components (skills coherence, career quality, experience fit, behavioral
  engagement, education tier) combined with weighted aggregation and a
  multiplicative bias-mitigation layer. The skills component cross-validates
  claimed skills against career description evidence to defeat keyword stuffers.
  Career scoring detects production deployment signals vs research-only
  backgrounds. Behavioral scoring converts Redrob platform engagement (recency,
  response rate, notice period) into an availability multiplier. Honeypot
  detection uses logical consistency checks (impossible timelines, zero-duration
  experts, overlapping jobs). Education is deliberately compressed to ≤5% weight
  for fairness. Runtime is ~3 minutes for 100K candidates on CPU with no network.

